<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caixa - Estação Verde</title>

<link rel="icon" type="image/png" href="logo.png">
<link rel="stylesheet" href="estilo.css">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_DOMINIO",
  projectId: "SEU_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.firebase = { collection, addDoc, getDocs, updateDoc, doc };
</script>
</head>

<body>

<div class="topo">
  <img src="logo.png" class="logo">
  <h1>Caixa Online</h1>
  <div id="statusCaixa" class="status fechado">CAIXA FECHADO</div>
</div>

<div class="botoes-caixa">
<button class="btn-abrir" onclick="abrirCaixa()">Abrir Caixa</button>
<button class="btn-fechar" onclick="fecharCaixa()">Fechar Caixa</button>
</div>

<div class="menu">
<button onclick="mostrar('produtos')">Produtos</button>
<button onclick="mostrar('vendas')">Vendas</button>
<button onclick="mostrar('historico')">Histórico</button>
</div>

<div id="produtos" class="tela">
<h2>Novo Produto</h2>
<input type="text" id="nomeProduto" placeholder="Nome">
<input type="number" id="precoProduto" placeholder="Preço">
<input type="number" id="estoqueProduto" placeholder="Estoque">
<button onclick="salvarProduto()">Salvar</button>

<h3>Lista de Produtos</h3>
<div id="listaProdutos"></div>
</div>

<div id="vendas" class="tela" style="display:none">
<h2>Vendas</h2>
<input type="text" id="buscar" placeholder="Buscar produto" oninput="buscarProduto()">
<div id="resultadoBusca"></div>

<h3>Total: R$ <span id="totalVenda">0</span></h3>
<button onclick="finalizarVenda()">Finalizar Venda</button>
</div>

<div id="historico" class="tela" style="display:none">
<h2>Histórico</h2>
<h3>Total do Dia: R$ <span id="totalDia">0</span></h3>
<div id="listaHistorico"></div>
</div>

<script src="app.js"></script>

</body>
</html>
