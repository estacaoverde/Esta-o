<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caixa - Estação Verde</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div id="loginTela">
  <img src="logo.png" style="max-width:200px; display:block; margin:auto;">
  <h2>Login</h2>
  <input id="usuario" placeholder="Usuário">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
</div>

<div id="sistema" class="escondido">

<div style="text-align:center; margin-bottom:20px;">
  <img src="logo.png" style="max-width:250px;">
</div>

<button onclick="abrirCaixa()">Abrir Caixa</button>
<button onclick="fecharCaixa()">Fechar Caixa</button>
<p id="statusCaixa" class="status fechado">CAIXA FECHADO</p>

<hr>

<button onclick="mostrarTela('produtosTela')">Produtos</button>
<button onclick="mostrarTela('vendasTela')">Vendas</button>
<button onclick="mostrarTela('historicoTela')">Histórico</button>

<!-- PRODUTOS -->
<div id="produtosTela" class="tela">
  <h3>Cadastrar Produto</h3>
  <input id="nomeProduto" placeholder="Nome">
  <input id="precoProduto" type="number" placeholder="Preço">
  <input id="estoqueProduto" type="number" placeholder="Estoque">
  <button onclick="salvarProduto()">Salvar</button>

  <h3>Lista de Produtos</h3>
  <div id="listaProdutos"></div>
</div>

<!-- VENDAS -->
<div id="vendasTela" class="tela escondido">
  <h3>Buscar Produto</h3>
  <input id="buscar" placeholder="Nome do produto" onkeyup="buscarProduto()">
  <div id="resultadoBusca"></div>

  <h3>Dados da Venda</h3>
  <input id="nomeCliente" placeholder="Nome do Cliente">
  <select id="formaPagamento">
    <option value="Dinheiro">Dinheiro</option>
    <option value="Pix">Pix</option>
    <option value="Cartão Crédito">Cartão Crédito</option>
    <option value="Cartão Débito">Cartão Débito</option>
  </select>

  <h3>Carrinho</h3>
  <div id="carrinhoDiv"></div>
  <h3>Total: R$ <span id="total">0.00</span></h3>
  <button onclick="finalizarVenda()">Finalizar Venda</button>
</div>

<!-- HISTÓRICO -->
<div id="historicoTela" class="tela escondido">
  <h3>Histórico de Vendas</h3>
  <button onclick="gerarPDF()">Gerar PDF do Dia</button>
  <button onclick="gerarRelatorioMensal()">Relatório Mensal</button>
  <div id="listaHistorico"></div>
</div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
